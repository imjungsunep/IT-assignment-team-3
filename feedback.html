<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback — TechNova Electronics</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <a class="logo" href="home.html">TechNova Electronics</a>
  </header>
  <nav>
    <ul>
      <li><a href="home.html">Home</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="feedback.html" class="active">Feedback</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="procurement.html">Procurement</a></li>
    </ul>
  </nav>
  <main>
    <h1 class="page-title">Customer Feedback</h1>
    <p>We value your opinion. Please rate your experience and leave your comments below.</p>
    <section class="form-section">
      <form id="feedback-form" action="#" method="post" novalidate>
        <div class="form-group">
          <label for="fb-name">Name</label>
          <input type="text" id="fb-name" name="name" autocomplete="name">
        </div>
        <div class="form-group">
          <label for="fb-email">Email</label>
          <input type="email" id="fb-email" name="email" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="fb-rating">Rating</label>
          <select id="fb-rating" name="rating">
            <option value="">— Choose rating (1–5) —</option>
            <option value="1">1 — Poor</option>
            <option value="2">2 — Fair</option>
            <option value="3">3 — Good</option>
            <option value="4">4 — Very good</option>
            <option value="5">5 — Excellent</option>
          </select>
        </div>
        <div class="form-group">
          <label for="fb-comments">Comments</label>
          <textarea id="fb-comments" name="comments" rows="5"></textarea>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-primary">Submit</button>
        </div>
      </form>
    </section>
  </main>
  <footer>
    <p><strong>TechNova Electronics</strong></p>
    <p>&copy; 2026 TechNova Electronics. All rights reserved.</p>
  </footer>
  <script src="script.js"></script>
</body>
</html>
